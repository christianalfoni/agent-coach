name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binaries
        run: |
          bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile dist/claude-beacon-macos-arm64
          bun build --compile --target=bun-darwin-x64   src/index.ts --outfile dist/claude-beacon-macos-x64
          bun build --compile --target=bun-linux-x64    src/index.ts --outfile dist/claude-beacon-linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
